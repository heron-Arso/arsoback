spring:
  datasource:
    url: jdbc:mysql://localhost:3306/koala?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 604800000

cloud:
  aws:
    s3:
      bucket: koala-dev
    region:
      static: ap-northeast-2
    credentials:
      access-key: test
      secret-key: test

koala:
  cdn-base-url: https://dev-cdn.koala.com

toss:
  secret-key: test_sk_placeholder

logging:
  level:
    com.koala.koalaback: DEBUG
    org.hibernate.SQL: DEBUG