server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/KoALa?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: rexyoon
    password: 1234

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      password:

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@example.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: local-kakao-client-id
            client-secret: local-kakao-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
          naver:
            client-id: local-naver-client-id
            client-secret: local-naver-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

oauth2:
  redirect-uri: http://localhost:3000/oauth2/callback

jwt:
  secret: local-dev-secret-key-must-be-at-least-32-characters-long-1234567890
  access-token-expiry-ms: 1800000
  refresh-token-expiry-ms: 604800000

cloud:
  aws:
    s3:
      bucket: local-bucket
    region:
      static: ap-northeast-2
    credentials:
      access-key: local-access-key
      secret-key: local-secret-key

koala:
  cdn-base-url: http://localhost:8080

toss:
  secret-key: test_sk_placeholder

logging:
  level:
    com.koala.koalaback: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
